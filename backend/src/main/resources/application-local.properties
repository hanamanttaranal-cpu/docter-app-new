# ==========================================
# Spring Boot User Profile: local 
# (For running the Spring App locally without Docker while MySQL 8.0 is in Docker)
# ==========================================

server.port=8080

# Database Configuration (Connects to localhost:3306 instead of the container name)
spring.datasource.url=jdbc:mysql://localhost:3306/docconsult_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=docconsult_user
spring.datasource.password=docconsult_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Setup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Security Configuration for local Dev
spring.security.oauth2.client.registration.google.client-id=placeholder-clientId
spring.security.oauth2.client.registration.google.client-secret=placeholder-clientSecret
spring.security.oauth2.client.registration.google.scope=profile,email

# Session & JWT Constants
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000

# WebSocket broker mappings
app.websocket.endpoint=/ws
app.websocket.broker=/topic,/queue

# Swagger / OpenAPI Endpoint paths
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Max multipart file sizing for uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================
# Cloudinary Configuration for Image/Asset Storage
# ==========================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:docconsult_cloud}
cloudinary.api-key=${CLOUDINARY_API_KEY:346394969957731}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:UbgLX3_vAMfvnHupOMGxxkN_WkM}
