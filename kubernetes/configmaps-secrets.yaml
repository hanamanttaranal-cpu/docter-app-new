apiVersion: v1
kind: Namespace
metadata:
  name: medconsult
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: medconsult-config
  namespace: medconsult
  labels:
    app: medconsult
data:
  SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-service:3306/medconsult?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
  SPRING_DATASOURCE_USERNAME: "medconsult_user"
  SPRING_JPA_DATABASE_PLATFORM: "org.hibernate.dialect.MySQLDialect"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
---
apiVersion: v1
kind: Secret
metadata:
  name: medconsult-secrets
  namespace: medconsult
  labels:
    app: medconsult
type: Opaque
stringData:
  # In a production environment, use a secure secret provider or KMS
  MYSQL_ROOT_PASSWORD: "SuperSecureRootPassword2026"
  MYSQL_PASSWORD: "MedConsultSecureUserPassword99"
