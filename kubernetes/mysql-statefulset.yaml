apiVersion: v1
kind: Service
metadata:
  name: mysql-headless
  namespace: medconsult
  labels:
    app: medconsult
    component: mysql
spec:
  ports:
    - name: mysql
      port: 3306
  clusterIP: None
  selector:
    app: medconsult
    component: mysql
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: medconsult
  labels:
    app: medconsult
    component: mysql
spec:
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
  clusterIP: ClusterIP
  selector:
    app: medconsult
    component: mysql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: medconsult
  labels:
    app: medconsult
    component: mysql
spec:
  serviceName: mysql-headless
  replicas: 1
  selector:
    matchLabels:
      app: medconsult
      component: mysql
  template:
    metadata:
      labels:
        app: medconsult
        component: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medconsult-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: medconsult
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: medconsult-config
                  key: SPRING_DATASOURCE_USERNAME
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medconsult-secrets
                  key: MYSQL_PASSWORD
          ports:
            - name: mysql
              containerPort: 3306
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          # Liveness and Readiness Probes using standard mysqladmin commands
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$(MYSQL_ROOT_PASSWORD)"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$(MYSQL_ROOT_PASSWORD)"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 10Gi
